<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор Группы - Horror Edition</title>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #101010;
            --text-main: #f0f0f0;
            --text-muted: #666;
            --border-color: #2a0000;
            --red-pure: #ff0000;
            --red-blood: #b30000;
            --red-glow: rgba(255, 0, 0, 0.6);
            --red-glow-strong: rgba(255, 0, 0, 0.9);
            --button-border: #440000;
            --online-glow: rgba(0, 255, 100, 0.8);
            --input-bg: #151515;
            --green-btn: #10b981;
        }

        body {
            margin: 0; padding: 20px;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at center, #1a0000 0%, #050505 100%);
        }

        .container { width: 100%; max-width: 650px; }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px; margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: var(--red-blood);
            box-shadow: 0 6px 25px var(--red-glow);
        }

        h2 {
            margin: 0 0 8px 0; color: var(--red-pure);
            text-shadow: 0 0 10px var(--red-glow-strong);
        }

        #myInfo { margin-bottom: 12px; font-size: 14px; color: var(--text-muted); }
        
        .timer-display {
            font-size: 28px;
            font-weight: bold;
            color: var(--red-pure);
            text-shadow: 0 0 12px var(--red-glow-strong);
            font-family: 'Courier New', Courier, monospace;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #0a0000;
            padding: 10px;
            border-radius: 8px;
            border: 1px dashed var(--red-blood);
        }

        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }

        .status-btn {
            background: transparent; border: 2px solid var(--button-border);
            border-radius: 8px; color: var(--text-main);
            padding: 12px; cursor: pointer; transition: all 0.3s ease;
            text-transform: uppercase; font-weight: 600;
            box-sizing: border-box;
            width: 100%;
        }
        .status-btn:hover {
            background-color: var(--red-blood);
            border-color: var(--red-pure);
            box-shadow: 0 0 20px var(--red-glow-strong);
            transform: translateY(-2px);
        }

        .divider {
            height: 1px;
            background: radial-gradient(circle, var(--red-blood) 0%, transparent 100%);
            margin: 20px 0;
        }

        .btn-danger {
            background-color: rgba(179, 0, 0, 0.15) !important;
            border-color: var(--red-blood) !important;
            color: #ff3333 !important;
        }
        .btn-danger:hover { background-color: var(--red-blood) !important; color: #fff !important; }

        .btn-warning {
            background-color: rgba(218, 165, 32, 0.1) !important;
            border-color: #aa8000 !important;
            color: #ffd700 !important;
        }
        .btn-warning:hover { background-color: #aa8000 !important; color: #fff !important; }

        .btn-secondary {
            background-color: rgba(68, 68, 68, 0.2) !important;
            border-color: #444 !important;
            color: #aaa !important;
        }
        .btn-secondary:hover { background-color: #444 !important; color: #fff !important; }

        .user-item {
            display: flex; align-items: center; gap: 15px;
            padding: 12px; border-radius: 8px; transition: 0.3s;
            border-bottom: 1px solid #150000;
        }
        .user-item:hover { background: #150505; }

        .status-badge { display: flex; align-items: center; position: relative; }
        .status-dot { width: 14px; height: 14px; border-radius: 50%; transition: all 0.5s ease; }

        .online-indicator {
            position: absolute; top: -4px; right: -4px; width: 8px; height: 8px; border-radius: 50%;
            background-color: #00ff64; box-shadow: 0 0 8px var(--online-glow);
        }
        .offline-indicator {
            position: absolute; top: -4px; right: -4px; width: 8px; height: 8px; border-radius: 50%;
            background-color: #444;
        }
        
        .user-details strong { font-size: 16px; color: #fff; }
        .user-details small { color: #aaa; }
        .study-time-tag { font-size: 12px; color: var(--red-pure); opacity: 0.9; font-family: monospace; margin-left: 5px; }

        .chat-box {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            height: 200px;
            overflow-y: auto;
            padding: 12px;
            margin-bottom: 12px;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .chat-message { line-height: 1.4; word-break: break-word; border-left: 2px solid #2a0000; padding-left: 6px; }
        .chat-message .author { color: var(--red-pure); font-weight: bold; }
        .chat-message .text { color: var(--text-main); font-style: italic; }
        
        .chat-input-row { display: flex; gap: 10px; }
        .chat-input {
            flex-grow: 1;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            padding: 12px;
            outline: none;
            transition: 0.3s;
        }
        .chat-input:focus { border-color: var(--red-blood); box-shadow: 0 0 10px rgba(179,0,0,0.3); }
        
        .chat-send-btn {
            background: var(--green-btn);
            border: none;
            border-radius: 8px;
            color: white;
            padding: 0 16px;
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-send-btn:hover { filter: brightness(1.2); transform: scale(1.05); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Мой профиль</h2>
        
        <div id="authBlock" style="margin-bottom: 15px;">
            <button class="status-btn" style="border-color: #24292e; color: #fff; background: #24292e;" onclick="signInWithGitHub()">
                🐙 Войти через GitHub
            </button>
        </div>

        <div id="myInfo">Авторизация...</div>
        
        <div class="button-grid">
            <button class="status-btn" onclick="changeStatus('🩸 Учусь', '#ff0000')">🩸 Учусь</button>
            <button class="status-btn" onclick="changeStatus('☠️ Кофе', '#ffd700')">☠️ Кофе</button>
            <button class="status-btn" onclick="changeStatus('👺 В игре', '#00ffff')">👺 В игре</button>
            <button class="status-btn" onclick="changeStatus('⛓️ Дома', '#888888')">⛓️ Дома</button>
        </div>

        <div class="divider"></div>

        <div class="timer-display">
            <span>⏱️</span> <span id="localTimer">00 сек.</span>
        </div>

        <div style="display: flex; flex-direction: column; gap: 12px;">
            <button class="status-btn btn-danger" onclick="toggleTimer(true)">
                🛑 Завершить сессию (Старт Таймера)
            </button>
            
            <div class="button-grid" style="margin-bottom: 0;">
                <button class="status-btn btn-warning" onclick="toggleTimer(false)">
                    ☕ Перерыв (Пауза)
                </button>
                <button class="status-btn btn-secondary" onclick="goOffline()">
                    Выход
                </button>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>Монитор группы</h2>
        <div id="groupList"></div>
    </div>

    <div class="card">
        <h2>💬 Последние крики (Чат)</h2>
        <div class="chat-box" id="chatBox">Загрузка...</div>
        <div class="chat-input-row">
            <input type="text" class="chat-input" id="chatInput" placeholder="Высказать мысль..." onkeydown="if(event.key === 'Enter') sendMessage()">
            <button class="chat-send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const URL = 'https://dgleaolfczlbmctieyms.supabase.co';
    const KEY = 'sb_publishable_200xFfadZQVbnM_BSplPlg_u0shrYGd';
    const supabase = createClient(URL, KEY);

    // Переменная вместо MY_ID, теперь определяется динамически при входе
    let CURRENT_USER_ID = null;
    let myUsername = 'Аноним';
    
    let isTimerActive = false;
    let totalStudySeconds = 0;
    let timerInterval = null;

    function formatTime(seconds) {
        if (!seconds || seconds <= 0) return '0 сек.';
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = seconds % 60;
        if (h > 0) return `${h}ч ${m}м ${s}с`;
        if (m > 0) return `${m}м ${s}с`;
        return `${s} сек.`;
    }

    // Логика авторизации GitHub
    window.signInWithGitHub = async () => {
        await supabase.auth.signInWithOAuth({
            provider: 'github',
            options: { 
            redirectTo: 'https://aleks40444.github.io/hto/' 
        }
        });
    };

    window.logOut = async () => {
        await supabase.auth.signOut();
        window.location.reload();
    };

    // Функция проверки сессии при загрузке страницы
    async function checkUserSession() {
        const { data: { session } } = await supabase.auth.getSession();
        
        if (session && session.user) {
            CURRENT_USER_ID = session.user.id;
            // Достаем имя или логин из метаданных GitHub
            myUsername = session.user.user_metadata.full_name || session.user.user_metadata.user_name || 'Инкогнито';
            
            // Скрываем кнопку входа и показываем кнопку "Выйти"
            document.getElementById('authBlock').innerHTML = `
                <button class="status-btn" style="border-color: #333; color: #888; font-size: 11px; padding: 6px;" onclick="logOut()">
                    🚪 Выйти из аккаунта GitHub
                </button>
            `;

            // Проверяем, есть ли запись в таблице profiles, если нет — создаем её
            const { data: profile } = await supabase.from('profiles').select('*').eq('id', CURRENT_USER_ID).single();
            if (!profile) {
                await supabase.from('profiles').insert([
                    { id: CURRENT_USER_ID, username: myUsername, status: '⛓️ Дома', color: '#888888', study_seconds: 0 }
                ]);
            }
        } else {
            document.getElementById('myInfo').innerText = "❌ Войдите через GitHub для управления профилем";
        }
        
        // Сразу запускаем получение данных
        fetchGroupAndChat();
    }

    window.changeStatus = async (text, color) => {
        if (!CURRENT_USER_ID) return alert("Сначала нужно авторизоваться!");
        await supabase.from('profiles').update({ status: text, color: color, last_seen: new Date().toISOString() }).eq('id', CURRENT_USER_ID);
        fetchGroupAndChat();
    };

    window.toggleTimer = function(start) {
        if (!CURRENT_USER_ID) return alert("Сначала нужно авторизоваться!");
        isTimerActive = start;
        clearInterval(timerInterval);
        if (isTimerActive) {
            timerInterval = setInterval(async () => {
                totalStudySeconds++;
                document.getElementById('localTimer').innerText = formatTime(totalStudySeconds);
                if (totalStudySeconds % 5 === 0) {
                    await supabase.from('profiles').update({ study_seconds: totalStudySeconds, last_seen: new Date().toISOString() }).eq('id', CURRENT_USER_ID);
                }
            }, 1000);
        } else {
            supabase.from('profiles').update({ study_seconds: totalStudySeconds }).eq('id', CURRENT_USER_ID);
        }
    };

    window.goOffline = async () => {
        if (!CURRENT_USER_ID) return;
        window.toggleTimer(false);
        const longAgo = new Date(Date.now() - 60000).toISOString();
        await supabase.from('profiles').update({ last_seen: longAgo }).eq('id', CURRENT_USER_ID);
        fetchGroupAndChat();
    };

    setInterval(async () => {
        if (CURRENT_USER_ID && !isTimerActive) {
            await supabase.from('profiles').update({ last_seen: new Date().toISOString() }).eq('id', CURRENT_USER_ID);
        }
    }, 10000);

    async function fetchGroupAndChat() {
        const { data, error } = await supabase.from('profiles').select('*').order('username', { ascending: true });
        if (error) return console.error(error);

        const list = document.getElementById('groupList');
        const chatBox = document.getElementById('chatBox');
        const now = new Date();

        list.innerHTML = data.map(user => {
            const lastSeenDate = user.last_seen ? new Date(user.last_seen) : new Date(0);
            const diffSeconds = Math.floor((now - lastSeenDate) / 1000);
            const isOnline = diffSeconds < 15;

            return `
                <div class="user-item">
                    <div class="status-badge">
                        <div class="status-dot" style="background: ${user.color || '#ccc'}; box-shadow: 0 0 10px ${user.color || '#ccc'}"></div>
                        <div class="${isOnline ? 'online-indicator' : 'offline-indicator'}"></div>
                    </div>
                    <div class="user-details" style="flex-grow: 1;">
                        <strong>${user.username}</strong> 
                        <span class="study-time-tag">⏱️ ${formatTime(user.study_seconds)}</span>
                        <br>
                        <small>${user.status || 'В небытии'}</small>
                    </div>
                </div>
            `;
        }).join('');

        const messagesHtml = data
            .filter(user => user.last_message) 
            .map(user => `
                <div class="chat-message">
                    <span class="author">${user.username}:</span>
                    <span class="text">${user.last_message}</span>
                </div>
            `).join('');

        chatBox.innerHTML = messagesHtml || '<div style="color: #444; font-style: italic;">Тишина... Никто еще не кричал.</div>';

        // Инициализация данных текущего залогиненного пользователя
        if (CURRENT_USER_ID) {
            const me = data.find(u => u.id === CURRENT_USER_ID);
            if (me) {
                document.getElementById('myInfo').innerText = `Жертва: ${me.username}`;
                if (totalStudySeconds === 0) {
                    totalStudySeconds = me.study_seconds || 0;
                    document.getElementById('localTimer').innerText = formatTime(totalStudySeconds);
                }
            }
        }
    }

    window.sendMessage = async () => {
        if (!CURRENT_USER_ID) return alert("Сначала нужно авторизоваться!");
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;

        input.value = '';

        const { error } = await supabase
            .from('profiles')
            .update({ last_message: text, last_seen: new Date().toISOString() })
            .eq('id', CURRENT_USER_ID);

        if (error) console.error(error);
        else fetchGroupAndChat();
    };

    // Вместо прямого вызова fetchGroupAndChat сначала проверяем сессию
    checkUserSession();
    setInterval(fetchGroupAndChat, 4000);
</script>

</body>
</html>

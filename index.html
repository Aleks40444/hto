<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор Группы</title>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #4b5563;
            --border-color: #e5e7eb;
            --blue-time: #2563eb;
            --red-btn: #dc2626;
            --yellow-btn: #eab308;
            --gray-btn: #4b5563;
            --green-btn: #10b981;
            --online-dot: #10b981;
        }

        body {
            margin: 0; padding: 20px;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 600px; }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px; margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            text-align: center;
        }

        h2 {
            margin: 0 0 16px 0; 
            color: var(--text-main);
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #myInfo { 
            margin-bottom: 16px; 
            font-size: 22px; 
            font-weight: bold; 
            color: #000;
        }
        
        /* Стилизация таймера */
        .timer-display {
            font-size: 32px;
            font-weight: bold;
            color: var(--blue-time);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }

        .status-btn {
            background: var(--card-bg); 
            border: 1px solid var(--border-color);
            border-radius: 8px; 
            color: var(--text-main);
            padding: 12px; 
            cursor: pointer; 
            transition: all 0.2s ease;
            font-weight: 600;
            box-sizing: border-box;
            width: 100%;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .status-btn:hover {
            background-color: #f9fafb;
            transform: translateY(-1px);
        }

        /* Кнопки управления сессией */
        .btn-danger {
            background-color: var(--red-btn) !important;
            color: #fff !important;
            border: none !important;
        }
        .btn-danger:hover { filter: brightness(0.9); }

        .btn-warning {
            background-color: var(--yellow-btn) !important;
            color: #fff !important;
            border: none !important;
        }
        .btn-warning:hover { filter: brightness(0.9); }

        .btn-secondary {
            background-color: var(--gray-btn) !important;
            color: #fff !important;
            border: none !important;
        }
        .btn-secondary:hover { filter: brightness(0.9); }

        /* Список пользователей */
        .user-item {
            display: flex; align-items: center; gap: 15px;
            padding: 14px; border-radius: 12px; transition: 0.2s;
            text-align: left;
        }
        .user-item:hover { background: #f9fafb; }

        .status-badge { display: flex; align-items: center; position: relative; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; }

        /* Сетевой статус */
        .online-indicator {
            background-color: var(--online-dot); 
        }
        .offline-indicator {
            background-color: #9ca3af;
        }
        
        .user-details { display: flex; width: 100%; justify-content: space-between; align-items: center; }
        .user-details strong { font-size: 16px; color: var(--text-main); }
        .user-details small { color: var(--text-muted); font-size: 14px; }
        .study-time-tag { font-size: 13px; color: #9ca3af; font-family: monospace; }

        /* ЧАТ */
        .chat-box {
            background: #f9fafb;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            height: 180px;
            overflow-y: auto;
            padding: 14px;
            margin-bottom: 12px;
            font-size: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: left;
        }
        .chat-message { line-height: 1.4; word-break: break-word; }
        .chat-message .author { color: var(--text-main); font-weight: bold; }
        .chat-message .text { color: var(--text-muted); }
        
        .chat-input-row { display: flex; gap: 10px; }
        .chat-input {
            flex-grow: 1;
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            padding: 12px;
            outline: none;
            transition: 0.2s;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
        }
        .chat-input:focus { border-color: #3b82f6; }
        
        .chat-send-btn {
            background: var(--green-btn);
            border: none;
            border-radius: 8px;
            color: white;
            padding: 0 16px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-send-btn:hover { filter: brightness(1.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div id="myInfo">Загрузка...</div>
        
        <div class="timer-display">
            <span>⏱️</span> <span id="localTimer">00 сек.</span>
        </div>

        <div style="display: flex; flex-direction: column; gap: 12px;">
            <button class="status-btn btn-danger" onclick="toggleTimer(true)">
                🛑 Завершить сессию
            </button>
            
            <div class="button-grid" style="margin-bottom: 0;">
                <button class="status-btn btn-warning" onclick="toggleTimer(false)">
                    ☕ Перерыв
                </button>
                <button class="status-btn btn-secondary" onclick="goOffline()">
                    Выход
                </button>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>🎥 Монитор группы</h2>
        <div id="groupList"></div>
    </div>

    <div class="card">
        <h2>💬 Общий чат</h2>
        <div class="chat-box" id="chatBox">Загрузка...</div>
        <div class="chat-input-row">
            <input type="text" class="chat-input" id="chatInput" placeholder="Сообщение..." onkeydown="if(event.key === 'Enter') sendMessage()">
            <button class="chat-send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const URL = 'https://dgleaolfczlbmctieyms.supabase.co';
    const KEY = 'sb_publishable_200xFfadZQVbnM_BSplPlg_u0shrYGd';
    const supabase = createClient(URL, KEY);

    // ПОДСТАВЬ СЮДА СВОЙ ID ИЗ ТАБЛИЦЫ SUPABASE PROFILES
    const MY_ID = '6d0d2192-3d4a-475b-bf97-2a2ef029d948'; 
    
    let isTimerActive = false;
    let totalStudySeconds = 0;
    let timerInterval = null;

    function formatTime(seconds) {
        if (!seconds || seconds <= 0) return '0ч 0м 0с';
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = seconds % 60;
        return `${h}ч ${m}м ${s}с`;
    }

    function formatLocalTime(seconds) {
        if (!seconds || seconds <= 0) return '00 сек.';
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = seconds % 60;
        if (h > 0) return `${h}ч ${m}м ${s}с`;
        if (m > 0) return `${m}м ${s}с`;
        return `${s} сек.`;
    }

    window.toggleTimer = function(start) {
        isTimerActive = start;
        clearInterval(timerInterval);
        if (isTimerActive) {
            // Ставим статус "Учусь", когда запускаем таймер
            supabase.from('profiles').update({ status: '📚 Учусь', last_seen: new Date().toISOString() }).eq('id', MY_ID);
            
            timerInterval = setInterval(async () => {
                totalStudySeconds++;
                document.getElementById('localTimer').innerText = formatLocalTime(totalStudySeconds);
                if (totalStudySeconds % 5 === 0) {
                    await supabase.from('profiles').update({ study_seconds: totalStudySeconds, last_seen: new Date().toISOString() }).eq('id', MY_ID);
                }
            }, 1000);
        } else {
            // Ставим статус "Перерыв", когда останавливаем таймер
            supabase.from('profiles').update({ status: '☕ Перерыв', study_seconds: totalStudySeconds }).eq('id', MY_ID);
        }
    };

    window.goOffline = async () => {
        window.toggleTimer(false);
        const longAgo = new Date(Date.now() - 60000).toISOString();
        await supabase.from('profiles').update({ status: '🏠 Дома', last_seen: longAgo }).eq('id', MY_ID);
        fetchGroupAndChat();
    };

    // Вечный пинг онлайна раз в 10 секунд
    setInterval(async () => {
        if (isTimerActive) {
            await supabase.from('profiles').update({ last_seen: new Date().toISOString() }).eq('id', MY_ID);
        }
    }, 10000);

    // Рендеринг интерфейса
    async function fetchGroupAndChat() {
        const { data, error } = await supabase.from('profiles').select('*').order('username', { ascending: true });
        if (error) return console.error(error);

        const list = document.getElementById('groupList');
        const chatBox = document.getElementById('chatBox');
        const now = new Date();

        // 1. Монитор группы
        list.innerHTML = data.map(user => {
            const lastSeenDate = user.last_seen ? new Date(user.last_seen) : new Date(0);
            const diffSeconds = Math.floor((now - lastSeenDate) / 1000);
            const isOnline = diffSeconds < 15;

            return `
                <div class="user-item">
                    <div class="status-badge">
                        <div class="status-dot ${isOnline ? 'online-indicator' : 'offline-indicator'}"></div>
                    </div>
                    <div class="user-details">
                        <div>
                            <strong>${user.username}</strong>
                        </div>
                        <div style="text-align: right;">
                            <small>${user.status || '🏠 Дома'}</small>
                            <div class="study-time-tag">⏱️ ${formatTime(user.study_seconds)}</div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        // 2. Чат
        const messagesHtml = data
            .filter(user => user.last_message) 
            .map(user => `
                <div class="chat-message">
                    <span class="author">${user.username}:</span>
                    <span class="text">${user.last_message}</span>
                </div>
            `).join('');

        chatBox.innerHTML = messagesHtml || '<div style="color: #9ca3af; font-style: italic;">Чат пуст...</div>';

        // Инициализация при первой загрузке
        const me = data.find(u => u.id === MY_ID);
        if (me) {
            document.getElementById('myInfo').innerText = me.username;
            if (totalStudySeconds === 0) {
                totalStudySeconds = me.study_seconds || 0;
                document.getElementById('localTimer').innerText = formatLocalTime(totalStudySeconds);
            }
        }
    }

    // Отправка сообщений
    window.sendMessage = async () => {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;

        input.value = '';

        const { error } = await supabase
            .from('profiles')
            .update({ last_message: text, last_seen: new Date().toISOString() })
            .eq('id', MY_ID);

        if (error) console.error(error);
        else fetchGroupAndChat();
    };

    // Запуск обновлений каждые 4 секунды
    fetchGroupAndChat();
    setInterval(fetchGroupAndChat, 4000);
</script>

</body>
</html>

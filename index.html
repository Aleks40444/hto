<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор Группы - Horror Edition</title>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #101010;
            --text-main: #f0f0f0;
            --text-muted: #666;
            --border-color: #2a0000;
            --red-pure: #ff0000;
            --red-blood: #b30000;
            --red-glow: rgba(255, 0, 0, 0.6);
            --red-glow-strong: rgba(255, 0, 0, 0.9);
            --button-border: #440000;
            --online-glow: rgba(0, 255, 100, 0.8);
        }

        body {
            margin: 0; padding: 20px;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at center, #1a0000 0%, #050505 100%);
        }

        .container { width: 100%; max-width: 650px; }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px; margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: var(--red-blood);
            box-shadow: 0 6px 25px var(--red-glow);
        }

        h2 {
            margin: 0 0 8px 0; color: var(--red-pure);
            text-shadow: 0 0 10px var(--red-glow-strong);
        }

        #myInfo { margin-bottom: 12px; font-size: 14px; color: var(--text-muted); }
        
        /* Стилизация таймера */
        .timer-display {
            font-size: 28px;
            font-weight: bold;
            color: var(--red-pure);
            text-shadow: 0 0 12px var(--red-glow-strong);
            font-family: 'Courier New', Courier, monospace;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #0a0000;
            padding: 10px;
            border-radius: 8px;
            border: 1px dashed var(--red-blood);
        }

        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .status-btn {
            background: transparent; border: 2px solid var(--button-border);
            border-radius: 8px; color: var(--text-main);
            padding: 14px; cursor: pointer; transition: all 0.3s ease;
            text-transform: uppercase; font-weight: 600;
            width: 100%;
            box-sizing: border-box;
        }

        /* Цвета кнопок под стиль оригинального скриншота */
        .btn-danger {
            background-color: rgba(179, 0, 0, 0.15) !important;
            border-color: var(--red-blood) !important;
            color: #ff3333 !important;
        }
        .btn-danger:hover {
            background-color: var(--red-blood) !important;
            color: #fff !important;
            box-shadow: 0 0 20px var(--red-glow-strong) !important;
            transform: translateY(-2px);
        }

        .btn-warning {
            background-color: rgba(218, 165, 32, 0.1) !important;
            border-color: #aa8000 !important;
            color: #ffd700 !important;
        }
        .btn-warning:hover {
            background-color: #aa8000 !important;
            color: #fff !important;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6) !important;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: rgba(68, 68, 68, 0.2) !important;
            border-color: #444 !important;
            color: #aaa !important;
        }
        .btn-secondary:hover {
            background-color: #444 !important;
            color: #fff !important;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2) !important;
            transform: translateY(-2px);
        }

        /* Список пользователей */
        .user-item {
            display: flex; align-items: center; gap: 15px;
            padding: 12px; border-radius: 8px; transition: 0.3s;
            border-bottom: 1px solid #150000;
        }
        .user-item:hover { background: #150505; }

        .status-badge {
            display: flex;
            align-items: center;
            position: relative;
        }

        .status-dot {
            width: 14px; height: 14px; border-radius: 50%;
            transition: all 0.5s ease;
        }

        /* Метка сетевого статуса (Online / Offline) */
        .online-indicator {
            position: absolute;
            top: -4px; right: -4px;
            width: 8px; height: 8px;
            border-radius: 50%;
            background-color: #00ff64;
            box-shadow: 0 0 8px var(--online-glow);
        }
        .offline-indicator {
            position: absolute;
            top: -4px; right: -4px;
            width: 8px; height: 8px;
            border-radius: 50%;
            background-color: #444;
        }
        
        .user-details strong { font-size: 16px; color: #fff; }
        .user-details small { color: #aaa; }
        .study-time-tag { 
            font-size: 12px; 
            color: var(--red-pure); 
            opacity: 0.9;
            font-family: monospace;
            margin-left: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Мой профиль</h2>
        <div id="myInfo">Загрузка...</div>
        
        <div class="timer-display">
            <span>⏱️</span> <span id="localTimer">00 сек.</span>
        </div>

        <div style="display: flex; flex-direction: column; gap: 12px;">
            <button class="status-btn btn-danger" onclick="changeStatus('🩸 Учусь', '#ff0000')">
                🛑 Завершить сессию
            </button>
            
            <div class="button-grid">
                <button class="status-btn btn-warning" onclick="changeStatus('☠️ Перерыв', '#ffd700')">
                    ☕ Перерыв
                </button>
                <button class="status-btn btn-secondary" onclick="changeStatus('⛓️ Вышел', '#888888')">
                    Выход
                </button>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>Монитор группы</h2>
        <div id="groupList"></div>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const URL = 'https://dgleaolfczlbmctieyms.supabase.co';
    const KEY = 'sb_publishable_200xFfadZQVbnM_BSplPlg_u0shrYGd';
    const supabase = createClient(URL, KEY);

    const MY_ID = '6d0d2192-3d4a-475b-bf97-2a2ef029d948';
    
    let currentStatus = '';
    let totalStudySeconds = 0;
    let timerInterval = null;

    // Форматирование времени
    function formatTime(seconds) {
        if (!seconds || seconds <= 0) return '0 сек.';
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = seconds % 60;
        
        if (h > 0) return `${h}ч ${m}м ${s}с`;
        if (m > 0) return `${m}м ${s}с`;
        return `${s} сек.`;
    }

    // Смена статуса в БД
    window.changeStatus = async (text, color) => {
        currentStatus = text;
        
        const { error } = await supabase
            .from('profiles')
            .update({ 
                status: text, 
                color: color,
                last_seen: new Date().toISOString()
            })
            .eq('id', MY_ID);

        if (error) {
            alert("Ошибка RLS или базы данных!");
            console.error(error);
        } else {
            manageTimer();
            fetchGroup();
        }
    };

    // Управление локальным таймером
    function manageTimer() {
        clearInterval(timerInterval);
        
        if (currentStatus === '🩸 Учусь') {
            timerInterval = setInterval(async () => {
                totalStudySeconds++;
                document.getElementById('localTimer').innerText = formatTime(totalStudySeconds);
                
                // Каждые 5 секунд отправляем накопленное время и пинг в базу
                if (totalStudySeconds % 5 === 0) {
                    await supabase
                        .from('profiles')
                        .update({ 
                            study_seconds: totalStudySeconds,
                            last_seen: new Date().toISOString() 
                        })
                        .eq('id', MY_ID);
                }
            }, 1000);
        } else {
            document.getElementById('localTimer').innerText = formatTime(totalStudySeconds);
        }
    }

    // Фоновый пинг онлайна раз в 10 секунд
    setInterval(async () => {
        await supabase
            .from('profiles')
            .update({ last_seen: new Date().toISOString() })
            .eq('id', MY_ID);
    }, 10000);

    // Получение списка группы
    async function fetchGroup() {
        const { data, error } = await supabase
            .from('profiles')
            .select('*')
            .order('username', { ascending: true });

        if (error) return console.error(error);

        const list = document.getElementById('groupList');
        const now = new Date();

        list.innerHTML = data.map(user => {
            // Если последнее действие было меньше 15 секунд назад — онлайн
            const lastSeenDate = user.last_seen ? new Date(user.last_seen) : new Date(0);
            const diffSeconds = Math.floor((now - lastSeenDate) / 1000);
            const isOnline = diffSeconds < 15;

            return `
                <div class="user-item">
                    <div class="status-badge">
                        <div class="status-dot" style="background: ${user.color || '#ccc'}; box-shadow: 0 0 10px ${user.color || '#ccc'}"></div>
                        <div class="${isOnline ? 'online-indicator' : 'offline-indicator'}"></div>
                    </div>
                    <div class="user-details" style="flex-grow: 1;">
                        <strong>${user.username}</strong> 
                        <span class="study-time-tag">⏱️ ${formatTime(user.study_seconds)}</span>
                        <br>
                        <small>${user.status || 'В небытии'}</small>
                    </div>
                </div>
            `;
        }).join('');

        // Инициализация при первой загрузке страницы
        const me = data.find(u => u.id === MY_ID);
        if (me && !currentStatus) {
            document.getElementById('myInfo').innerText = `Жертва: ${me.username}`;
            currentStatus = me.status || '';
            totalStudySeconds = me.study_seconds || 0;
            document.getElementById('localTimer').innerText = formatTime(totalStudySeconds);
            manageTimer();
        }
    }

    // Запуск цикла обновлений списка (раз в 4 секунды)
    fetchGroup();
    setInterval(fetchGroup, 4000);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор Группы - Horror Edition</title>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #101010;
            --text-main: #f0f0f0;
            --text-muted: #888;
            --border-color: #2a0000;
            --red-pure: #ff0000;
            --red-blood: #b30000;
            --red-glow: rgba(255, 0, 0, 0.6);
            --red-glow-strong: rgba(255, 0, 0, 0.9);
            --button-border: #440000;
        }

        body {
            margin: 0; padding: 20px;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at center, #1a0000 0%, #050505 100%);
        }

        .container { width: 100%; max-width: 650px; }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px; margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: var(--red-blood);
            box-shadow: 0 6px 25px var(--red-glow);
        }

        h2 {
            margin: 0 0 8px 0; color: var(--red-pure);
            text-shadow: 0 0 10px var(--red-glow-strong);
        }

        #myInfo { margin-bottom: 20px; font-size: 14px; color: var(--text-muted); }

        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .status-btn {
            background: transparent; border: 2px solid var(--button-border);
            border-radius: 8px; color: var(--text-main);
            padding: 12px; cursor: pointer; transition: all 0.3s ease;
            text-transform: uppercase; font-weight: 600;
        }

        .status-btn:hover {
            background-color: var(--red-blood);
            border-color: var(--red-pure);
            box-shadow: 0 0 20px var(--red-glow-strong);
            transform: translateY(-2px);
        }

        /* Стили для списка пользователей */
        .user-item {
            display: flex; align-items: center; gap: 15px;
            padding: 12px; border-radius: 8px; transition: 0.3s;
        }
        .user-item:hover { background: #1a1a1a; }

        .status-dot {
            width: 12px; height: 12px; border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }
        
        strong { font-size: 16px; }
        small { color: var(--text-muted); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Мой профиль</h2>
        <div id="myInfo">Загрузка...</div>
        <div class="button-grid">
            <button class="status-btn" onclick="changeStatus('🩸 Учусь', '#ff0000')">🩸 Учусь</button>
            <button class="status-btn" onclick="changeStatus('☠️ Кофе', '#ffd700')">☠️ Кофе</button>
            <button class="status-btn" onclick="changeStatus('👺 В игре', '#00ffff')">👺 В игре</button>
            <button class="status-btn" onclick="changeStatus('⛓️ Дома', '#888888')">⛓️ Дома</button>
        </div>
    </div>

    <div class="card">
        <h2>Монитор группы</h2>
        <div id="groupList">
            </div>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const URL = 'https://dgleaolfczlbmctieyms.supabase.co';
    const KEY = 'sb_publishable_200xFfadZQVbnM_BSplPlg_u0shrYGd';
    const supabase = createClient(URL, KEY);

    const MY_ID = '6d0d2192-3d4a-475b-bf97-2a2ef029d948';

    // Делаем функцию доступной для HTML кнопок
    window.changeStatus = async (text, color) => {
        const { error } = await supabase
            .from('profiles')
            .update({ status: text, color: color })
            .eq('id', MY_ID);

        if (error) {
            alert("Ошибка! Проверьте RLS политики.");
            console.error(error);
        } else {
            fetchGroup();
        }
    };

    async function fetchGroup() {
        const { data, error } = await supabase
            .from('profiles')
            .select('*')
            .order('username', { ascending: true });

        if (error) return console.error(error);

        const list = document.getElementById('groupList');
        list.innerHTML = data.map(user => `
            <div class="user-item">
                <div class="status-dot" style="background: ${user.color || '#ccc'}; box-shadow: 0 0 10px ${user.color || '#ccc'}"></div>
                <div style="flex-grow: 1;">
                    <strong>${user.username}</strong><br>
                    <small>${user.status || 'Нет статуса'}</small>
                </div>
            </div>
        `).join('');

        const me = data.find(u => u.id === MY_ID);
        if (me) document.getElementById('myInfo').innerText = `Вы зашли как: ${me.username}`;
    }

    fetchGroup();
    setInterval(fetchGroup, 5000);
</script>

</body>
</html>
